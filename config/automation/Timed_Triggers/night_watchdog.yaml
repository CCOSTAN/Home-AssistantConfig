# Stuff that needs to happen after 10pm - Home Assistant automation behavior.
#  Defines the Stuff that needs to happen after 10pm triggers, conditions, and actions.
# -------------------------------------------------------------------
######################################################################
- alias: Automated NIGHT WatchDog!
  id: 4ce973ea-b78a-4440-99d1-7f8eb4400eab
  trigger:
    - platform: state
      entity_id: switch.lr_amp
      to: 'on'
      for: '00:10:00'
    - platform: state
      entity_id: media_player.livingroomCC
      to: 'off'
      for: '00:02:00'
    - platform: state
      entity_id: media_player.everywhere
      to: 'off'
      for: '00:02:00'

  condition:
    condition: or
    conditions:
      - condition: and
        conditions:
          - condition: state
            entity_id: group.family
            state: 'not_home'
          - condition: state
            entity_id: input_boolean.guest_mode
            state: 'off'
      - condition: and
        conditions:
          - condition: state
            entity_id: input_boolean.vacation_mode
            state: 'on'
          - condition: state
            entity_id: input_boolean.house_sitter_present
            state: 'off'
      - condition: and
        conditions:
          - condition: state
            entity_id: input_boolean.guest_mode
            state: 'off'
          - condition: state
            entity_id: group.bed
            state: 'on'

  action:
    - service: switch.turn_off
      data:
        entity_id: "{{ trigger.entity_id }}"


- alias: 'Bedroom Screensaver Watchdog'
  id: Bedroom-Screensaver-Watchdog-automation
  mode: single
  max_exceeded: silent
  trigger:
    - platform: state 
      entity_id: binary_sensor.sleepnumber_carlo_carlo_is_in_bed
      to: 'on'
    - platform: state
      entity_id: binary_sensor.sleepnumber_carlo_stacey_is_in_bed  
      to: 'on'
    - platform: state
      entity_id: switch.alarm_panel_1_screensaver
      to: 'off'

  condition:
    - condition: or
      conditions:
        - condition: state
          entity_id: binary_sensor.sleepnumber_carlo_carlo_is_in_bed
          state: 'on'
        - condition: state
          entity_id: binary_sensor.sleepnumber_carlo_stacey_is_in_bed
          state: 'on'
    - condition: state
      entity_id: switch.alarm_panel_1_screensaver
      state: 'off'

  action:
    - service: switch.turn_on
      entity_id: switch.alarm_panel_1_screensaver
