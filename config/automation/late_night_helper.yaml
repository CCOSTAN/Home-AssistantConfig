# -------------------------------------------------------------------
# Late Night lights Section - Home Assistant automation behavior.
#  Defines the Late Night lights Section triggers, conditions, and actions.
# -------------------------------------------------------------------
######################################################################
- alias: 'Late Night Helper'
  id: acacc9b4-b66d-46d2-bf6d-47b75afddb57
  trigger:
    - platform: state
      entity_id: group.family
      to: 'home'

  condition:
    condition: and
    conditions:
      - condition: state
        entity_id: sun.sun
        state: 'below_horizon'
      - condition: state
        entity_id: group.bed
        state: 'off'

  action:
    - service: light.turn_on
      entity_id:
        - light.main_slider
        - light.foyer
        - light.fridge
        - light.M1_front_right
        - light.S1
        - light.S4
    - service: light.turn_on
      entity_id:
        - light.outdoor_bathroom
      data:
        brightness: 10
    - service: switch.turn_on
      entity_id:
        - group.kitchen_Accents
        - switch.front_office_lamp
        - switch.living_room_outlet
    - delay: '00:05:00'
    - service: light.turn_off
      entity_id:
        - light.S1
        - light.S4
        - light.foyer
        - light.fridge
        - light.main_slider
        - light.M1_front_right


