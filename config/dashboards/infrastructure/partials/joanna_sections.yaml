# -------------------------------------------------------------------
# Infrastructure Partial - Joanna sections
#  Joanna/BearClaw dispatch KPI, trend, latest-state, and filtered activity panels.
# -------------------------------------------------------------------
# Notes: Reuses shared bearstone_infra_* templates and standard infra card_mod snippets.
######################################################################

- type: grid
  column_span: 4
  columns: 6
  square: false
  cards:
  - type: custom:button-card
    template: bearstone_infra_kpi
    entity: sensor.joanna_ha_dispatches_24h
    name: HA 24H
    icon: mdi:calendar-clock
  - type: custom:button-card
    template: bearstone_infra_kpi
    entity: sensor.joanna_ha_dispatches_7d
    name: HA 7D
    icon: mdi:calendar-range
  - type: custom:button-card
    template: bearstone_infra_kpi
    entity: sensor.joanna_ha_dispatches_30d
    name: HA 30D
    icon: mdi:calendar-month
  - type: custom:button-card
    template: bearstone_infra_kpi
    entity: sensor.joanna_ha_errors_24h
    name: HA Errors 24H
    icon: mdi:alert-circle-outline
  - type: custom:button-card
    template: bearstone_infra_kpi
    entity: sensor.codex_reset_credits_available
    name: Resets
    icon: mdi:backup-restore
  - type: custom:button-card
    template: bearstone_infra_kpi
    entity: sensor.joanna_all_dispatches_24h
    name: All 24H
    icon: mdi:calendar-clock
  - type: custom:button-card
    template: bearstone_infra_kpi
    entity: sensor.joanna_all_dispatches_7d
    name: All 7D
    icon: mdi:calendar-range
  - type: custom:button-card
    template: bearstone_infra_kpi
    entity: sensor.joanna_all_dispatches_30d
    name: All 30D
    icon: mdi:calendar-month

- type: grid
  column_span: 4
  columns: 3
  square: false
  cards:
  - type: custom:vertical-stack-in-card
    card_mod:
      style: !include /config/dashboards/infrastructure/card_mod/infra_panel.yaml
    cards:
    - type: custom:button-card
      template: bearstone_infra_panel_header
      name: HA Dispatch Trend
    - type: custom:mini-graph-card
      name: HA Dispatches (24h Window)
      icon: mdi:chart-timeline-variant
      hours_to_show: 168
      points_per_hour: 1
      line_width: 2
      smoothing: true
      show:
        legend: false
        labels: false
        name: true
        icon: true
        state: true
      entities:
      - entity: sensor.joanna_ha_dispatches_24h
        name: HA 24h
      card_mod:
        style: !include /config/dashboards/infrastructure/card_mod/infra_card.yaml

  - type: custom:vertical-stack-in-card
    card_mod:
      style: !include /config/dashboards/infrastructure/card_mod/infra_panel.yaml
    cards:
    - type: custom:button-card
      template: bearstone_infra_panel_header
      name: Latest Snapshot
    - type: custom:button-card
      template: bearstone_infra_list_row
      entity: sensor.bearclaw_status_telemetry
      name: Latest HA Dispatch
      icon: mdi:robot
      state_display: >
        [[[
          const stats = states['sensor.bearclaw_status_telemetry']?.attributes?.dispatchStats || {};
          const latest = stats?.latest?.haAutomation || {};
          const source = latest?.source || 'none';
          const when = latest?.dispatchedAt || 'n/a';
          return `${source} | ${when}`;
        ]]]
    - type: custom:button-card
      template: bearstone_infra_list_row
      entity: sensor.bearclaw_status_telemetry
      name: Latest HA Completion
      icon: mdi:check-circle-outline
      state_display: >
        [[[
          const stats = states['sensor.bearclaw_status_telemetry']?.attributes?.dispatchStats || {};
          const latest = stats?.latest?.haAutomation || {};
          const state = latest?.state || 'none';
          const when = latest?.completedAt || 'n/a';
          return `${state} | ${when}`;
        ]]]
    - type: custom:button-card
      template: bearstone_infra_list_row
      entity: sensor.bearclaw_status_telemetry
      name: Latest Any Dispatch
      icon: mdi:robot-excited
      state_display: >
        [[[
          const stats = states['sensor.bearclaw_status_telemetry']?.attributes?.dispatchStats || {};
          const latest = stats?.latest?.all || {};
          const source = latest?.source || 'none';
          const when = latest?.dispatchedAt || 'n/a';
          return `${source} | ${when}`;
        ]]]
    - type: custom:button-card
      template: bearstone_infra_list_row
      entity: sensor.bearclaw_status_telemetry
      name: HA Success (24h)
      icon: mdi:percent-circle
      state_display: >
        [[[
          const v = states['sensor.joanna_ha_success_rate_24h']?.state ?? '0';
          return `${v}%`;
        ]]]
    - type: custom:button-card
      template: bearstone_infra_list_row
      entity: binary_sensor.joanna_qmd_healthy
      name: QMD Health
      icon: mdi:heart-pulse
      state_display: >
        [[[
          const qmd = states['sensor.bearclaw_status_telemetry']?.attributes?.qmdHealth || {};
          const healthy = states['binary_sensor.joanna_qmd_healthy']?.state === 'on';
          const status = qmd?.status || (healthy ? 'healthy' : 'unknown');
          const failures = states['sensor.joanna_qmd_consecutive_failures']?.state ?? '0';
          return `${status} | fail ${failures}`;
        ]]]
    - type: custom:button-card
      template: bearstone_infra_list_row
      entity: sensor.joanna_memory_docs
      name: Memory Index
      icon: mdi:database-search
      state_display: >
        [[[
          const docs = states['sensor.joanna_memory_docs']?.state ?? '0';
          const chunks = states['sensor.joanna_memory_chunks']?.state ?? '0';
          const stale = states['binary_sensor.joanna_memory_index_stale']?.state === 'on';
          return `${docs} docs | ${chunks} chunks${stale ? ' | stale' : ''}`;
        ]]]
    - type: custom:button-card
      template: bearstone_infra_list_row
      entity: binary_sensor.joanna_session_source_indexed
      name: Session Transcript Indexing
      icon: mdi:message-text-clock-outline
      state_display: >
        [[[
          const enabled = states['binary_sensor.joanna_session_source_indexed']?.state === 'on';
          const age = states['sensor.joanna_minutes_since_memory_index']?.state ?? '0';
          return `${enabled ? 'enabled' : 'disabled'} | ${age} min ago`;
        ]]]

  - type: custom:vertical-stack-in-card
    card_mod:
      style: !include /config/dashboards/infrastructure/card_mod/infra_panel.yaml
    cards:
    - type: custom:button-card
      template: bearstone_infra_panel_header
      name: Codex Reset Credits
    - type: custom:button-card
      template: bearstone_infra_list_row
      entity: sensor.codex_reset_credit_status
      name: Collector Status
      icon: mdi:clipboard-pulse-outline
      state_display: >
        [[[
          const usage = states['sensor.bearclaw_status_telemetry']?.attributes?.codexUsage || {};
          const status = usage.status || 'unknown';
          const ok = usage.ok === true;
          const last = usage.lastCheckAt ? String(usage.lastCheckAt).replace('T', ' ').slice(0, 16) : 'not checked';
          return `${ok ? 'ok' : status} | ${last}`;
        ]]]
    - type: custom:button-card
      template: bearstone_infra_list_row
      entity: sensor.codex_reset_credit_next_expiration
      name: Next Expiration
      icon: mdi:calendar-clock
      state_display: >
        [[[
          const usage = states['sensor.bearclaw_status_telemetry']?.attributes?.codexUsage || {};
          const days = usage.minDaysRemaining;
          const expRaw = usage.soonestExpiresAt || '';
          const exp = expRaw ? String(expRaw).replace('T', ' ').slice(0, 16) : 'n/a';
          const dayText = Number.isFinite(Number(days)) ? `${Number(days).toFixed(1)}d` : 'n/a';
          return `${dayText} | ${exp}`;
        ]]]
    - type: custom:button-card
      template: bearstone_infra_list_row
      entity: binary_sensor.codex_reset_credit_expiring_soon
      name: Repair Window
      icon: mdi:alert-clock
      state_display: >
        [[[
          const usage = states['sensor.bearclaw_status_telemetry']?.attributes?.codexUsage || {};
          const warn = usage.warnDays ?? 7;
          const count = usage.warningCount ?? 0;
          return `${count} within ${warn}d`;
        ]]]
    - type: custom:button-card
      template: bearstone_infra_list_row
      entity: sensor.bearclaw_status_telemetry
      name: Reset #1
      icon: mdi:backup-restore
      state_display: >
        [[[
          const credits = states['sensor.bearclaw_status_telemetry']?.attributes?.codexUsage?.credits || [];
          const credit = credits[0];
          if (!credit) return 'No reset';
          const days = Number.isFinite(Number(credit.days_remaining)) ? `${Number(credit.days_remaining).toFixed(1)}d` : 'n/a';
          const exp = credit.expires_at ? String(credit.expires_at).replace('T', ' ').slice(0, 16) : 'n/a';
          return `${credit.status || 'unknown'} | ${days} | ${exp}`;
        ]]]
    - type: custom:button-card
      template: bearstone_infra_list_row
      entity: sensor.bearclaw_status_telemetry
      name: Reset #2
      icon: mdi:backup-restore
      state_display: >
        [[[
          const credits = states['sensor.bearclaw_status_telemetry']?.attributes?.codexUsage?.credits || [];
          const credit = credits[1];
          if (!credit) return 'No reset';
          const days = Number.isFinite(Number(credit.days_remaining)) ? `${Number(credit.days_remaining).toFixed(1)}d` : 'n/a';
          const exp = credit.expires_at ? String(credit.expires_at).replace('T', ' ').slice(0, 16) : 'n/a';
          return `${credit.status || 'unknown'} | ${days} | ${exp}`;
        ]]]
    - type: custom:button-card
      template: bearstone_infra_list_row
      entity: sensor.bearclaw_status_telemetry
      name: Reset #3
      icon: mdi:backup-restore
      state_display: >
        [[[
          const credits = states['sensor.bearclaw_status_telemetry']?.attributes?.codexUsage?.credits || [];
          const credit = credits[2];
          if (!credit) return 'No reset';
          const days = Number.isFinite(Number(credit.days_remaining)) ? `${Number(credit.days_remaining).toFixed(1)}d` : 'n/a';
          const exp = credit.expires_at ? String(credit.expires_at).replace('T', ' ').slice(0, 16) : 'n/a';
          return `${credit.status || 'unknown'} | ${days} | ${exp}`;
        ]]]
    - type: custom:button-card
      template: bearstone_infra_list_row
      entity: sensor.bearclaw_status_telemetry
      name: Reset #4
      icon: mdi:backup-restore
      state_display: >
        [[[
          const credits = states['sensor.bearclaw_status_telemetry']?.attributes?.codexUsage?.credits || [];
          const credit = credits[3];
          if (!credit) return 'No reset';
          const days = Number.isFinite(Number(credit.days_remaining)) ? `${Number(credit.days_remaining).toFixed(1)}d` : 'n/a';
          const exp = credit.expires_at ? String(credit.expires_at).replace('T', ' ').slice(0, 16) : 'n/a';
          return `${credit.status || 'unknown'} | ${days} | ${exp}`;
        ]]]

- type: grid
  column_span: 4
  columns: 1
  square: false
  cards:
  - type: custom:layout-card
    grid_options:
      columns: full
    layout_type: custom:grid-layout
    layout:
      grid-template-columns: repeat(1, minmax(0, 1fr))
      grid-auto-flow: row
      grid-auto-rows: min-content
      grid-gap: 12px
      margin: 0
    cards:
    - type: custom:vertical-stack-in-card
      grid_options:
        columns: full
      card_mod:
        style: !include /config/dashboards/infrastructure/card_mod/infra_panel.yaml
      cards:
      - type: custom:button-card
        template: bearstone_infra_panel_header
        name: Joanna Activity
      # Fallback card: Lovelace logbook card is required to show filtered activity history.
      - type: logbook
        hours_to_show: 72
        entities:
        - automation.bearclaw_reply_webhook
        - automation.codex_reset_credit_expiry_repair
        - automation.tugtainer_dispatch_joanna_for_available_updates
        - binary_sensor.codex_reset_credit_expiring_soon
        - script.joanna_dispatch
